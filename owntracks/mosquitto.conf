listener 1883

# WebSockets — pra clientes MQTT baseados em browser/JS (o app oficial
# do celular usa MQTT nativo na 1883 acima, não precisa desta). Mesma
# autenticação (allow_anonymous/password_file abaixo se aplicam a todos
# os listener sem per_listener_settings).
listener 9001
protocol websockets

allow_anonymous false
# Arquivo vem de um Secret= do Quadlet (ver mosquitto.container), não do
# bind mount de /mosquitto/config — não versionar/misturar os dois.
password_file /mosquitto/secrets/passwd

persistence true
persistence_location /mosquitto/data/

# Log pro stdout do container — captado por journalctl/podman logs, sem
# precisar de mais um volume só pra arquivo de log.
log_dest stdout
