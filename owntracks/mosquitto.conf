listener 1883
allow_anonymous false
# Arquivo vem de um Secret= do Quadlet (ver mosquitto.container), não do
# bind mount de /mosquitto/config — não versionar/misturar os dois.
password_file /mosquitto/secrets/passwd

persistence true
persistence_location /mosquitto/data/

# Log pro stdout do container — captado por journalctl/podman logs, sem
# precisar de mais um volume só pra arquivo de log.
log_dest stdout
